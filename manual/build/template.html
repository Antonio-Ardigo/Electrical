<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Manual — Electrical Assessments</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:   #11457e;
  --navy-dk:#0a2d52;
  --navy-lt:#e8eef6;
  --amber:  #cc7a00;
  --amber-lt:#fff3d6;
  --grey-1: #f4f5f7;
  --grey-2: #e2e4e9;
  --grey-3: #9aa0ad;
  --grey-4: #4a5260;
  --text:   #1a1e28;
  --sidebar-w: 270px;
  --content-max: 860px;
  --radius: 4px;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-ui:   system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
  --font-code: 'Courier New', Courier, monospace;
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font-body);
  color: var(--text);
  background: #fff;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== HEADER ===== */
#site-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--navy);
  color: #fff;
  padding: 0 1.25rem;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 6px rgba(0,0,0,.35);
}

#site-header .header-title {
  font-family: var(--font-ui);
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1 1 auto;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-shrink: 0;
}

.rev-badge {
  font-family: var(--font-ui);
  font-size: 0.7rem;
  font-weight: 700;
  background: var(--amber);
  color: #fff;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.btn {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,.35);
  background: rgba(255,255,255,.1);
  color: #fff;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,.22); }

#sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  padding: 4px 6px;
  font-size: 1.2rem;
  line-height: 1;
}

/* ===== LAYOUT ===== */
#layout {
  display: flex;
  flex: 1 1 auto;
  min-height: 0;
}

/* ===== SIDEBAR ===== */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--grey-1);
  border-right: 1px solid var(--grey-2);
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--grey-3) transparent;
}

#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--grey-3); border-radius: 3px; }

#sidebar nav { padding: 1rem 0 2rem; }

.nav-part-header {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--grey-3);
  padding: 0.9rem 1rem 0.3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.nav-part-header:hover { color: var(--navy); }

.nav-part-toggle {
  font-size: 0.7rem;
  transition: transform .2s;
}
.nav-part.collapsed .nav-part-toggle { transform: rotate(-90deg); }

.nav-part-items { list-style: none; }
.nav-part.collapsed .nav-part-items { display: none; }

.nav-item > a {
  display: block;
  font-family: var(--font-ui);
  font-size: 0.8rem;
  color: var(--grey-4);
  text-decoration: none;
  padding: 5px 1rem 5px 1.1rem;
  border-left: 3px solid transparent;
  transition: color .15s, border-color .15s, background .15s;
  line-height: 1.35;
}
.nav-item > a:hover {
  color: var(--navy);
  background: var(--navy-lt);
  border-left-color: var(--navy);
}
.nav-item.active > a {
  color: var(--navy);
  font-weight: 600;
  border-left-color: var(--navy);
  background: var(--navy-lt);
}

/* Sub-items (h3) */
.nav-sub-items { list-style: none; }
.nav-sub-item > a {
  display: block;
  font-family: var(--font-ui);
  font-size: 0.73rem;
  color: var(--grey-3);
  text-decoration: none;
  padding: 3px 1rem 3px 2rem;
  border-left: 3px solid transparent;
  transition: color .15s, border-color .15s;
}
.nav-sub-item > a:hover { color: var(--navy); border-left-color: var(--navy-lt); }
.nav-sub-item.active > a { color: var(--navy); border-left-color: var(--navy); }

/* ===== MAIN CONTENT ===== */
#main {
  flex: 1 1 auto;
  min-width: 0;
  padding: 2rem 2.5rem 4rem;
}

#content {
  max-width: var(--content-max);
  margin: 0 auto;
}

/* ===== SECTIONS ===== */
section {
  padding-top: 1.5rem;
  margin-bottom: 3rem;
  border-top: 3px solid var(--navy-lt);
}
section:first-child { border-top: none; }

/* ===== TYPOGRAPHY ===== */
h2 {
  font-family: var(--font-ui);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 1rem;
  line-height: 1.25;
}

h3 {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--navy-dk);
  margin-top: 1.8rem;
  margin-bottom: 0.6rem;
  line-height: 1.3;
  scroll-margin-top: 60px;
}

h4 {
  font-family: var(--font-ui);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--grey-4);
  margin-top: 1.2rem;
  margin-bottom: 0.4rem;
}

p {
  line-height: 1.75;
  margin-bottom: 0.9rem;
  font-size: 0.97rem;
}

ul, ol {
  margin: 0.5rem 0 0.9rem 1.5rem;
  line-height: 1.7;
  font-size: 0.95rem;
}

li { margin-bottom: 0.2rem; }

a { color: var(--navy); }
a:hover { color: var(--amber); }

code {
  font-family: var(--font-code);
  font-size: 0.85em;
  background: var(--grey-1);
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--grey-2);
}

pre {
  background: var(--grey-1);
  border: 1px solid var(--grey-2);
  border-radius: var(--radius);
  padding: 1rem;
  overflow-x: auto;
  font-size: 0.84rem;
  line-height: 1.6;
  margin: 0.8rem 0 1rem;
}
pre code { background: none; border: none; padding: 0; font-size: inherit; }

/* ===== CALLOUT BOXES ===== */
.note, .tip, .warning, .key {
  border-radius: var(--radius);
  padding: 0.8rem 1rem 0.8rem 2.8rem;
  margin: 1rem 0;
  font-size: 0.92rem;
  line-height: 1.6;
  position: relative;
}
.note::before, .tip::before, .warning::before, .key::before {
  position: absolute;
  left: 0.85rem;
  top: 0.78rem;
  font-size: 1rem;
  line-height: 1;
}

.note   { background: #e8f0fb; border-left: 4px solid #3478c6; }
.tip    { background: #e9f6ee; border-left: 4px solid #2d9e5f; }
.warning{ background: #fff0e0; border-left: 4px solid var(--amber); }
.key    { background: var(--navy-lt); border-left: 4px solid var(--navy); font-weight: 600; }

.note::before    { content: "ℹ"; color: #3478c6; }
.tip::before     { content: "✓"; color: #2d9e5f; }
.warning::before { content: "⚠"; color: var(--amber); }
.key::before     { content: "★"; color: var(--navy); }

/* ===== WORKED EXAMPLE ===== */
.worked {
  background: var(--grey-1);
  border: 1px solid var(--grey-2);
  border-top: 4px solid var(--amber);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  margin: 1.2rem 0;
  font-size: 0.93rem;
}
.worked h4 {
  color: var(--amber);
  margin-top: 0;
  font-size: 0.92rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.worked p { margin-bottom: 0.5rem; }
.worked .formula {
  font-family: var(--font-code);
  font-size: 0.9em;
  background: #fff;
  border: 1px solid var(--grey-2);
  padding: 0.5rem 0.8rem;
  border-radius: 3px;
  display: block;
  margin: 0.4rem 0;
  overflow-x: auto;
}

/* ===== CHECKLIST ===== */
ul.checklist {
  list-style: none;
  margin-left: 0;
  padding: 0;
}
ul.checklist li {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  padding: 0.3rem 0;
  font-size: 0.95rem;
  line-height: 1.5;
  border-bottom: 1px solid var(--grey-2);
  cursor: pointer;
}
ul.checklist li:last-child { border-bottom: none; }
ul.checklist li input[type="checkbox"] {
  flex-shrink: 0;
  margin-top: 0.2rem;
  width: 15px;
  height: 15px;
  accent-color: var(--navy);
  cursor: pointer;
}
ul.checklist li.checked-item {
  text-decoration: line-through;
  color: var(--grey-3);
}
.checklist-progress {
  font-family: var(--font-ui);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--grey-4);
  background: var(--grey-1);
  border: 1px solid var(--grey-2);
  border-radius: var(--radius);
  padding: 3px 10px;
  margin-bottom: 0.5rem;
  display: inline-block;
}
.checklist-progress .prog-done { color: var(--navy); }

/* ===== TABLES ===== */
table.tbl {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0;
  font-size: 0.88rem;
  font-family: var(--font-ui);
}
table.tbl thead th {
  background: var(--navy);
  color: #fff;
  font-weight: 700;
  padding: 8px 10px;
  text-align: left;
  white-space: nowrap;
}
table.tbl tbody tr:nth-child(odd)  { background: var(--grey-1); }
table.tbl tbody tr:nth-child(even) { background: #fff; }
table.tbl tbody tr:hover { background: var(--navy-lt); }
table.tbl td { padding: 7px 10px; border-bottom: 1px solid var(--grey-2); vertical-align: top; }

/* Form table */
table.form {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0;
  font-size: 0.88rem;
  font-family: var(--font-ui);
  border: 1px solid var(--grey-2);
}
table.form tr { border-bottom: 1px solid var(--grey-2); }
table.form tr:last-child { border-bottom: none; }
table.form td:first-child {
  background: var(--grey-1);
  font-weight: 600;
  color: var(--grey-4);
  padding: 7px 10px;
  width: 35%;
  white-space: nowrap;
  border-right: 1px solid var(--grey-2);
}
table.form td:last-child {
  padding: 7px 12px;
  background: #fff;
}

/* ===== FIGURES ===== */
figure.fig {
  margin: 1.4rem 0;
  text-align: center;
}
figure.fig .svg-wrapper {
  display: block;
  max-width: 100%;
  overflow: hidden;
}
figure.fig .svg-wrapper svg {
  width: 100%;
  height: auto;
  max-width: 100%;
}
figcaption {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  color: var(--grey-4);
  margin-top: 0.5rem;
  font-style: italic;
}

/* SVG placeholder (missing file) */
.svg-missing {
  display: block;
  border: 2px dashed var(--amber);
  border-radius: var(--radius);
  background: var(--amber-lt);
  padding: 1.5rem;
  font-family: var(--font-ui);
  font-size: 0.82rem;
  color: var(--amber);
  text-align: center;
}

/* ===== COVER SECTION ===== */
#cover {
  border-top: none;
  padding-top: 2rem;
  text-align: center;
  margin-bottom: 4rem;
}
#cover h1 {
  font-family: var(--font-ui);
  font-size: 2rem;
  font-weight: 800;
  color: var(--navy);
  line-height: 1.2;
  margin-bottom: 0.5rem;
}
#cover .subtitle {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  color: var(--grey-4);
  margin-bottom: 1.5rem;
}
#cover .cover-meta {
  font-family: var(--font-ui);
  font-size: 0.82rem;
  color: var(--grey-3);
  border-top: 1px solid var(--grey-2);
  border-bottom: 1px solid var(--grey-2);
  padding: 0.7rem 0;
  margin: 1.5rem auto;
  max-width: 540px;
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  flex-wrap: wrap;
}
#cover .disclaimer {
  background: var(--amber-lt);
  border: 1px solid #f0c060;
  border-radius: var(--radius);
  padding: 0.8rem 1.2rem;
  font-size: 0.85rem;
  line-height: 1.6;
  max-width: 640px;
  margin: 0 auto 1.5rem;
  text-align: left;
  font-family: var(--font-ui);
}

/* h2 in cover section */
#cover h2 { text-align: left; margin-top: 2rem; }

/* ===== RESPONSIVE (narrow) ===== */
@media (max-width: 760px) {
  :root { --sidebar-w: 240px; }
  #sidebar {
    position: fixed;
    top: 52px;
    left: 0;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .25s ease;
  }
  #sidebar.open { transform: translateX(0); box-shadow: 3px 0 16px rgba(0,0,0,.2); }
  #sidebar-toggle { display: block; }
  #main { padding: 1.2rem 1rem 3rem; }
}

/* ===== PRINT ===== */
/* Utility classes for print/screen-only content */
.print-only { display: none; }

@page { size: A4; margin: 14mm 12mm; }

@media print {
  :root { --sidebar-w: 0 !important; }

  /* Linearise the whole document: no sidebar, no chrome, full width.
     The sidebar is removed from print entirely (a printed sidebar/TOC adds
     no value on paper) so the output is a clean, single-column manual. */
  #sidebar,
  #sidebar-toggle,
  #site-header .header-controls,
  .no-print { display: none !important; }

  html, body { background: #fff !important; width: auto !important; height: auto !important; }
  body { color: #000 !important; }

  #site-header { position: static !important; background: #fff !important; color: var(--navy) !important; box-shadow: none !important; border-bottom: 2px solid var(--navy); }
  .rev-badge { background: none !important; color: var(--navy) !important; border: 1px solid var(--navy); }

  #layout { display: block !important; }
  #main { padding: 0 !important; }
  #content { max-width: 100% !important; margin: 0 !important; }

  .print-only { display: block !important; }

  /* Page-break before each PART (not every section) so the printout is compact;
     sections flow within a Part. Never strand a heading at a page foot. */
  section { page-break-before: auto; border-top: 2px solid var(--navy-lt); }
  section[data-part-start] { page-break-before: always; }
  section:first-child { page-break-before: avoid; border-top: none; }
  h2 { font-size: 1.2rem; }
  h3 { font-size: 1rem; }
  h2, h3, h4 { page-break-after: avoid; break-after: avoid; }

  /* Keep these blocks intact across page boundaries */
  figure, table, .worked, .note, .tip, .warning, .key,
  ul.checklist li, .doc-embed-frame, tr {
    page-break-inside: avoid; break-inside: avoid;
  }

  /* Reveal any collapsed <details> so nothing is hidden on paper
     (the Print button also force-opens them via JS) */
  details { display: block !important; }
  details > *:not(summary) { display: revert !important; }
  details > summary { list-style: none; font-weight: 600; }

  a { color: var(--navy); text-decoration: none; }

  .note, .tip, .warning, .key,
  .worked { border: 1px solid #999; background: #f9f9f9 !important; }

  ul.checklist li input[type="checkbox"] { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  table.tbl thead th { background: var(--navy) !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Figures: never overflow the page width */
  figure.fig, .svg-wrapper { max-width: 100% !important; }
  figure.fig .svg-wrapper svg, .svg-wrapper svg { max-width: 100% !important; height: auto !important; }
  .doc-embed-frame { width: 100% !important; border: none !important; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="site-header">
  <button id="sidebar-toggle" aria-label="Toggle navigation" onclick="toggleSidebar()">☰</button>
  <span class="header-title">Field Manual — Electrical Assessments, SPOF Analysis &amp; Recommendations</span>
  <div class="header-controls">
    <span class="rev-badge"><!--REV--></span>
    <button class="btn" onclick="expandAll()">Expand all</button>
    <button class="btn" onclick="collapseAll()">Collapse all</button>
    <button class="btn" onclick="printManual()">Print / Save PDF</button>
  </div>
</header>

<!-- ===== LAYOUT ===== -->
<div id="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <nav id="sidebar-nav" aria-label="Manual contents">
      <!--NAV-->
    </nav>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="content">
      <!--CONTENT-->
    </div>
  </main>

</div><!-- #layout -->

<script>
(function () {
  'use strict';

  /* ---- Sidebar toggle (mobile) ---- */
  window.toggleSidebar = function () {
    document.getElementById('sidebar').classList.toggle('open');
  };

  /* ---- Part collapse / expand ---- */
  document.querySelectorAll('.nav-part-header').forEach(function (hdr) {
    hdr.addEventListener('click', function () {
      hdr.closest('.nav-part').classList.toggle('collapsed');
    });
  });

  window.expandAll = function () {
    document.querySelectorAll('.nav-part').forEach(function (p) { p.classList.remove('collapsed'); });
  };
  window.collapseAll = function () {
    document.querySelectorAll('.nav-part').forEach(function (p) { p.classList.add('collapsed'); });
  };

  /* ---- Robust print: reveal everything collapsible, then print ---- */
  window.printManual = function () {
    document.querySelectorAll('details').forEach(function (d) { d.open = true; });
    document.querySelectorAll('.nav-part').forEach(function (p) { p.classList.remove('collapsed'); });
    document.body.classList.add('printing');
    setTimeout(function () { window.print(); }, 120);
  };
  window.addEventListener('afterprint', function () {
    document.body.classList.remove('printing');
  });

  /* ---- Scrollspy ---- */
  var allNavAnchors = {};
  document.querySelectorAll('.nav-item, .nav-sub-item').forEach(function (el) {
    var a = el.querySelector('a');
    if (a && a.hash) {
      allNavAnchors[a.hash.slice(1)] = el;
    }
  });

  var headings = Array.from(document.querySelectorAll('section[id], h3[id]'));

  function getActiveId () {
    var scrollY = window.scrollY + 80;
    var active = null;
    for (var i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top + window.scrollY <= scrollY) {
        active = headings[i].id;
      } else {
        break;
      }
    }
    return active;
  }

  var lastActive = null;
  function updateScrollspy () {
    var id = getActiveId();
    if (id === lastActive) return;
    lastActive = id;
    Object.values(allNavAnchors).forEach(function (el) { el.classList.remove('active'); });
    if (id && allNavAnchors[id]) {
      var el = allNavAnchors[id];
      el.classList.add('active');
      // Expand parent part if collapsed
      var part = el.closest('.nav-part');
      if (part) part.classList.remove('collapsed');
    }
  }

  window.addEventListener('scroll', updateScrollspy, { passive: true });
  updateScrollspy();

  /* ---- Persistent Checklists ---- */
  function initChecklists () {
    document.querySelectorAll('ul.checklist').forEach(function (ul) {
      var section = ul.closest('section');
      var sectionId = section ? section.id : 'global';
      var items = ul.querySelectorAll('li');

      // Inject progress counter
      var prog = document.createElement('div');
      prog.className = 'checklist-progress';
      ul.parentNode.insertBefore(prog, ul);

      function updateProgress () {
        var done = ul.querySelectorAll('li input:checked').length;
        prog.innerHTML = 'Progress: <span class="prog-done">' + done + '</span> / ' + items.length;
      }

      items.forEach(function (li, idx) {
        var key = 'cl:' + sectionId + ':' + idx;

        // Wrap text in a span, prepend checkbox
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.setAttribute('aria-label', li.textContent.trim());

        var span = document.createElement('span');
        span.innerHTML = li.innerHTML;
        li.innerHTML = '';
        li.appendChild(cb);
        li.appendChild(span);

        // Restore saved state
        if (localStorage.getItem(key) === '1') {
          cb.checked = true;
          li.classList.add('checked-item');
        }

        function toggle () {
          cb.checked = !cb.checked;
          localStorage.setItem(key, cb.checked ? '1' : '0');
          li.classList.toggle('checked-item', cb.checked);
          updateProgress();
        }

        li.addEventListener('click', function (e) {
          if (e.target === cb) {
            localStorage.setItem(key, cb.checked ? '1' : '0');
            li.classList.toggle('checked-item', cb.checked);
            updateProgress();
          } else {
            toggle();
          }
        });

        updateProgress();
      });

      updateProgress();
    });
  }

  initChecklists();

  /* ---- Close sidebar on nav click (mobile) ---- */
  document.querySelectorAll('#sidebar-nav a').forEach(function (a) {
    a.addEventListener('click', function () {
      var sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('open')) sidebar.classList.remove('open');
    });
  });

})();
</script>

</body>
</html>
